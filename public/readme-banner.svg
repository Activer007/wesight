    <rect x="216" y="176" width="246" height="224" rx="18" fill="#07111f" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="242" y="215" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800">WeSight</text>
    <text x="244" y="252" fill="#a9bdd8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19" font-weight="500">Desktop AI Agent Workspace</text>
    <rect x="244" y="288" width="154" height="34" rx="17" fill="#57d6ff" fill-opacity="0.16" stroke="#57d6ff" stroke-opacity="0.55"/>
    <text x="267" y="311" fill="#bdefff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700">macOS first</text>
    <rect x="244" y="340" width="158" height="8" rx="4" fill="#ffffff" fill-opacity="0.18"/>
