    <rect x="500" y="176" width="448" height="224" rx="18" fill="#f8fbff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.13"/>
    <rect x="528" y="205" width="178" height="48" rx="14" fill="#57d6ff" fill-opacity="0.14" stroke="#57d6ff" stroke-opacity="0.38"/>
    <text x="552" y="235" fill="#e8f7ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700">Claude Code</text>
    <rect x="742" y="205" width="178" height="48" rx="14" fill="#8ef2c6" fill-opacity="0.13" stroke="#8ef2c6" stroke-opacity="0.38"/>
