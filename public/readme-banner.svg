    <rect x="528" y="279" width="178" height="48" rx="14" fill="#ffd166" fill-opacity="0.13" stroke="#ffd166" stroke-opacity="0.38"/>
    <text x="575" y="309" fill="#fff5dd" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700">OpenClaw</text>
    <rect x="742" y="279" width="178" height="48" rx="14" fill="#c7b7ff" fill-opacity="0.13" stroke="#c7b7ff" stroke-opacity="0.38"/>
    <text x="780" y="309" fill="#f2efff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" font-weight="700">Hermes Agent</text>
    <path d="M617 253V279M831 253V279M706 229H742M706 303H742" stroke="#ffffff" stroke-opacity="0.28" stroke-width="2" stroke-linecap="round"/>
    <rect x="604" y="352" width="244" height="24" rx="12" fill="url(#accent)" fill-opacity="0.95"/>
