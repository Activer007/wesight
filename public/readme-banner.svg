<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WeSight desktop AI agent workspace</title>
  <desc id="desc">A polished product banner showing WeSight as a desktop workspace for Claude Code, Codex, OpenClaw, Hermes Agent, and custom LLMs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="0.54" stop-color="#0f2137"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="panel" x1="190" y1="84" x2="1010" y2="436" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbfdff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#fbfdff" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="accent" x1="238" y1="146" x2="964" y2="382" gradientUnits="userSpaceOnUse">
      <stop stop-color="#57d6ff"/>
      <stop offset="0.5" stop-color="#8ef2c6"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="150" y="54" width="900" height="430" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#000814" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="38" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="38" fill="url(#grid)"/>
  <path d="M116 378C229 274 330 318 451 223C555 142 663 108 790 164C922 222 995 145 1087 94" stroke="url(#accent)" stroke-opacity="0.28" stroke-width="2"/>
  <path d="M150 410C291 348 354 399 484 318C605 243 716 247 829 310C949 377 1017 312 1106 247" stroke="url(#accent)" stroke-opacity="0.18" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="176" y="76" width="848" height="368" rx="26" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="198" y="100" width="804" height="48" rx="16" fill="#ffffff" fill-opacity="0.09" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="228" cy="124" r="6" fill="#ff6b6b"/>
    <circle cx="250" cy="124" r="6" fill="#ffd166"/>
    <circle cx="272" cy="124" r="6" fill="#6ee7b7"/>
